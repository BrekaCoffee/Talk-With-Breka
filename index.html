<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Talk with Breka</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        primary: "#55abe5",
      }
    }
  }
}
</script>

<style>
* {
  box-sizing: border-box;
}

html, body {
  overflow-x: hidden;
  width: 100%;
}

body {
  font-family: 'Poppins', sans-serif;
}

/* FIX OVERFLOW GLOBAL */
img, div, section {
  max-width: 100%;
}

/* fade */
.fade-in { animation: fade 1s ease forwards; opacity: 0; }
@keyframes fade { to { opacity: 1; } }

/* glass */
.glass {
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.7);
}
.dark .glass {
  background: rgba(0,0,0,0.5);
}

/* typing */
.typing::after {
  content: '|';
  animation: blink 1s infinite;
}
@keyframes blink {
  0%,100%{opacity:1}
  50%{opacity:0}
}

/* HERO */
.hero {
  background: #55abe5;
}
.dark .hero {
  background: radial-gradient(circle at top, #1e3a5f, #000);
}
</style>
</head>

<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-white">

  <!-- BREKA TALK -->
<div id="videoIntro" class="fixed inset-0 bg-black/80 flex items-center justify-center z-[60]">

  <div class="relative w-[90%] max-w-md">

    <!-- CLOSE -->
    <button onclick="closeVideo()" 
  class="fixed top-5 right-5 z-[9999] bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg">
  ✕
</button>

    <!-- VIDEO (NO AUTOPLAY) -->
    <video id="introVideo" controls class="rounded-xl w-full bg-black">
      <source src="brekavideo.mp4" type="video/mp4">
    </video>

  </div>

</div>
<!-- DARK MODE -->
<button onclick="toggleDark()" class="fixed top-5 right-5 z-50 glass px-4 py-2 rounded-full">
  🌙
</button>

<!-- LOADER -->
<div id="loader" class="fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-900 z-50">
  <h1 class="text-2xl tracking-widest">BREKA...</h1>
</div>

<!-- HERO -->
<section class="hero min-h-screen flex flex-col items-center justify-center text-center px-4 relative text-white overflow-hidden">

  <div class="relative z-10 max-w-2xl w-full fade-in">

    <div class="w-28 h-28 mx-auto mb-6 flex items-center justify-center rounded-full bg-white shadow-2xl border-4 border-white/30">
      <img src="breka_logo_512-removebg-preview.png" class="w-16">
    </div>

    <h1 class="text-4xl md:text-6xl font-bold mb-4">
      Talk with Breka
    </h1>

    <p id="typingText" class="text-lg text-white/80 typing h-10"></p>

    <div class="mt-8 flex gap-4 justify-center">
      <button onclick="startChat()" 
        class="px-6 py-3 bg-white text-primary rounded-full hover:scale-105 transition">
        Mulai Cerita
      </button>

      <a href="#pilar" 
        class="px-6 py-3 border border-white rounded-full hover:bg-white hover:text-primary transition">
        Eksplor
      </a>
    </div>
  </div>
</section>

<!-- CHAT -->
<section id="chat" class="hidden min-h-screen px-3 py-20 w-full overflow-hidden">
  <div class="max-w-2xl w-full mx-auto bg-white dark:bg-gray-900 rounded-2xl p-4 shadow-xl border border-gray-200 dark:border-white/10">

    <div id="chatBox" class="space-y-4 h-96 overflow-y-auto mb-4"></div>

    <!-- FIXED INPUT -->
    <div class="flex items-center gap-2 border border-gray-300 dark:border-white/20 rounded-xl px-2 py-2">
      
      <input 
        id="userInput" 
        type="text"
        placeholder="Ceritakan apa yang kamu rasakan..."
        class="flex-1 bg-transparent outline-none px-2 text-sm"
      >

      <button 
        onclick="sendMessage()" 
        class="flex-shrink-0 bg-primary text-white px-4 py-2 rounded-lg text-sm">
        Kirim
      </button>

    </div>

  </div>
</section>  

<!-- PILAR -->
<section id="pilar" class="py-20 px-4 bg-gray-200 dark:bg-transparent overflow-hidden">
  <div class="max-w-5xl mx-auto">
    <h2 class="text-3xl font-bold mb-10 text-center">Pesan Breka</h2>

    <div class="grid md:grid-cols-4 gap-6">

<a href="https://brekacoffee.github.io/CINTA/">
  <div class="glass p-6 rounded-2xl hover:scale-105 transition">
    <h3 class="font-bold mb-2">ASMARA</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">Tentang hati dan rasa</p>
  </div>
</a>

<a href="https://brekacoffee.github.io/KELUARGA/">
  <div class="glass p-6 rounded-2xl hover:scale-105 transition">
    <h3 class="font-bold mb-2">KELUARGA</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">Tempat pulang</p>
  </div>
</a>

<a href="https://brekacoffee.github.io/KARIR/">
  <div class="glass p-6 rounded-2xl hover:scale-105 transition">
    <h3 class="font-bold mb-2">KARIR</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">Langkah masa depan</p>
  </div>
</a>

<a href="https://brekacoffee.github.io/MASA-DEPAN/">
  <div class="glass p-6 rounded-2xl hover:scale-105 transition">
    <h3 class="font-bold mb-2">MASA DEPAN</h3>
    <p class="text-sm text-gray-600 dark:text-gray-400">Hidup & perjalanan</p>
  </div>
</a>

    </div>
  </div>
</section>

<footer class="bg-gray-900 text-white text-center py-10 text-sm">
  © Breka Coffee — Recharge Your Day
</footer>

<script>
function toggleDark(){
  document.documentElement.classList.toggle('dark')
}

setTimeout(()=>{
  document.getElementById('loader').style.display='none'
},1200)

const text = "Kadang kamu cuma butuh didengar, bukan disuruh kuat terus.";
let i = 0;
function type(){
  if(i < text.length){
    document.getElementById('typingText').innerHTML += text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
type();

function startChat(){
  document.getElementById('chat').classList.remove('hidden');
  document.getElementById('chat').scrollIntoView({behavior:'smooth'});
}

function generateResponse(input){
  input = input.toLowerCase();

  if(input.includes('capek')) return "Capek itu valid. Kamu ga harus selalu kuat.";
  if(input.includes('sedih')) return "Sedih itu tanda kamu peduli.";
  if(input.includes('sendiri')) return "Kamu ga sendiri, meskipun rasanya begitu.";

  return "Aku denger kok. Ceritain lagi ya.";
}

function sendMessage(){
  const input = document.getElementById('userInput');
  const chatBox = document.getElementById('chatBox');

  if(input.value.trim()==='') return;

  const userMsg = document.createElement('div');
  userMsg.className = 'text-right';
  userMsg.innerHTML = `<span class="inline-block bg-primary text-white px-4 py-2 rounded-xl">${input.value}</span>`;
  chatBox.appendChild(userMsg);

  const response = generateResponse(input.value);

  setTimeout(()=>{
    const botMsg = document.createElement('div');
    botMsg.innerHTML = `<span class="inline-block bg-gray-200 dark:bg-gray-800 px-4 py-2 rounded-xl">${response}</span>`;
    chatBox.appendChild(botMsg);
    chatBox.scrollTop = chatBox.scrollHeight;
  },600);

  input.value='';
}
  function closeVideo(){
  const el = document.getElementById('videoIntro');
  const video = document.getElementById('introVideo');

  // ⛔ STOP VIDEO + AUDIO
  if(video){
    video.pause();          // stop playback
    video.currentTime = 0;  // reset ke awal (opsional tapi disarankan)
  }

  // animasi fade
  el.style.opacity = '0';

  setTimeout(() => {
    el.style.display = 'none';
  }, 300);

  sessionStorage.setItem("videoSeen", "true");
}
</script>

</body>
</html>
